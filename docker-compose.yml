services:
  # CPU profile (default).
  oberon:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["oberon"]
    command: ["--help"]
    volumes:
      - ./input:/input:ro
      - ./output:/output
      - ./cache:/root/.cache/oberon
    environment:
      - OBERON_CACHE_DIR=/root/.cache/oberon
    profiles: ["", "cpu"]

  # GPU profile — torch + Clay.
  oberon-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    entrypoint: ["oberon"]
    command: ["--help"]
    volumes:
      - ./input:/input:ro
      - ./output:/output
      - ./cache:/root/.cache/oberon
    environment:
      - OBERON_CACHE_DIR=/root/.cache/oberon
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["gpu"]

  # Server profile — Rust API + Python pipeline + dashboard.
  # Use: docker compose --profile server up
  oberon-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8000:8000"
    volumes:
      - ./cache:/root/.cache/oberon
      - oberon-db:/root/.oberon
    environment:
      - OBERON_CACHE_DIR=/root/.cache/oberon
      - OBERON_LOG_FORMAT=json
      - OBERON_AUTH_DISABLED=***: non-root user for security
    user: "65532:65532"
    profiles: ["server"]

volumes:
  oberon-db:
